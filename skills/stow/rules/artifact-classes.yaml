# STOW packaged-artifact classes.
#
# Every file that tools/build_skill.py packages into the shipped skill is
# classified here into exactly one of eight owner classes, and each class is
# bound to the checks that govern it. tests/test_artifact_classes.py walks the
# same file set build_skill.py packages and fails if:
#   * any packaged file is unclassified (or a classified path is not packaged),
#   * any class binds zero checks,
#   * any generated-artifact file lacks a named generator,
#   * any kernel or operational-reference file is absent from the self-dogfood
#     walker set (imported from tests/test_self_dogfood.py).
#
# Paths are repo-relative. Checks name test files under tests/; generators name
# the tool that regenerates a file (run with --check for the freshness gate).
# STOW-native throughout: no external project names.
schema_version: 1

classes:

  kernel:
    description: "The always-loaded STOW kernel. One file."
    checks:
      - tests/test_references.py
      - tests/test_self_dogfood.py
    files:
      - skills/stow/SKILL.md

  operational-reference:
    description: "Authored reference modules loaded on a matched predicate."
    checks:
      - tests/test_references.py
      - tests/test_self_dogfood.py
    files:
      - skills/stow/references/action-shaping.md
      - skills/stow/references/activation-and-precedence.md
      - skills/stow/references/agent-handoffs.md
      - skills/stow/references/ai-writing-detection.md
      - skills/stow/references/audit-and-evidence.md
      - skills/stow/references/conformance.md
      - skills/stow/references/continuity-and-state.md
      - skills/stow/references/controlled-technical-writing.md
      - skills/stow/references/cross-harness-interchange.md
      - skills/stow/references/descriptions.md
      - skills/stow/references/evidence-and-authority.md
      - skills/stow/references/format-json.md
      - skills/stow/references/format-jsonl.md
      - skills/stow/references/format-markdown.md
      - skills/stow/references/format-yaml.md
      - skills/stow/references/implementation-plans.md
      - skills/stow/references/meta-code.md
      - skills/stow/references/procedures.md
      - skills/stow/references/prose-integrity.md
      - skills/stow/references/protected-regions.md
      - skills/stow/references/runbooks.md
      - skills/stow/references/safety-instructions.md
      - skills/stow/references/technical-clarity.md
      - skills/stow/references/user-facing-output.md

  protected-corpus:
    description: "Anchored corpus modules holding verbatim or STOW-authored rule wording. Drift-locked."
    checks:
      - tests/test_corpus.py
    files:
      - skills/stow/corpus/action-shaping.md
      - skills/stow/corpus/artifact-state/rules.md
      - skills/stow/corpus/authority/rules.md
      - skills/stow/corpus/descriptions.md
      - skills/stow/corpus/evidence/rules.md
      - skills/stow/corpus/general-practice.md
      - skills/stow/corpus/multiword-nouns.md
      - skills/stow/corpus/procedures.md
      - skills/stow/corpus/prose-integrity/banned-lists.md
      - skills/stow/corpus/prose-integrity/detection-patterns.md
      - skills/stow/corpus/prose-integrity/examples.md
      - skills/stow/corpus/prose-integrity/false-positives.md
      - skills/stow/corpus/prose-integrity/rules.md
      - skills/stow/corpus/punctuation.md
      - skills/stow/corpus/safety.md
      - skills/stow/corpus/sentences.md
      - skills/stow/corpus/style/consistency.md
      - skills/stow/corpus/style/economy.md
      - skills/stow/corpus/verbs/technical-verbs.md
      - skills/stow/corpus/verbs/verb-forms.md
      - skills/stow/corpus/words/approved-tables.md
      - skills/stow/corpus/words/selection.md
      - skills/stow/corpus/words/usage.md

  profile-or-rule-data:
    description: "Machine-readable rule, profile, and routing data plus their schema."
    checks:
      - tests/test_profiles.py
      - tests/test_registry.py
      - tests/test_conflicts.py
      - tests/test_routing.py
      - tests/test_artifact_classes.py
    files:
      - skills/stow/rules/artifact-classes.yaml
      - skills/stow/rules/conflicts.yaml
      - skills/stow/rules/profiles.json
      - skills/stow/rules/registry.schema.json
      - skills/stow/rules/registry.yaml
      - skills/stow/rules/routing.yaml

  runtime-code:
    description: "The shipped runtime allowlist: validator, linter, profile resolver, rule lookup helper."
    checks:
      - tests/test_structured_output.py
      - tests/test_lint_prose.py
      - tests/test_profiles.py
      - tests/test_query_rules.py
    files:
      - skills/stow/runtime/lint_prose.py
      - skills/stow/runtime/query_rules.py
      - skills/stow/runtime/profiles.py
      - skills/stow/runtime/validate.py

  schema:
    description: "JSON Schemas for meta-code artifacts and the output contract."
    checks:
      - tests/test_meta_schemas.py
    files:
      - skills/stow/schemas/event.schema.json
      - skills/stow/schemas/evidence-record.schema.json
      - skills/stow/schemas/handoff.schema.json
      - skills/stow/schemas/output-contract.schema.json
      - skills/stow/schemas/plan.schema.json
      - skills/stow/schemas/runbook.schema.json
      - skills/stow/schemas/state.schema.json
      - skills/stow/schemas/task-packet.schema.json

  template:
    description: "Fill-in templates for meta-code artifacts."
    checks:
      - tests/test_meta_templates.py
    files:
      - skills/stow/templates/AUDIT.md
      - skills/stow/templates/HANDOFF.md
      - skills/stow/templates/PLAN.md
      - skills/stow/templates/RUNBOOK.md
      - skills/stow/templates/STATE.md
      - skills/stow/templates/event-stream.jsonl
      - skills/stow/templates/task-packet.yaml

  generated-artifact:
    description: "Files produced from the registry by a generator; each names its generator."
    checks:
      - tests/test_always_on.py
      - tests/test_readme_catalog.py
    files:
      - path: skills/stow/references/always-on.md
        generator: tools/gen_always_on.py --check
      - path: skills/stow/references/rule-index.md
        generator: tools/gen_rule_index.py --check
