# === STOW-PRO-023 ===
  - id: STOW-PRO-023
    ordinal: '23'
    record_class: primary
    category: prose-integrity
    title: Quote sources accurately
    wording:
      baseline_kind: verbatim
      baseline_text: "**Quote sources accurately, and set off the long ones.** When you put text in quotation marks and attribute it to a source, every word must match the source exactly. Do not correct grammar, change plural to singular, swap pronouns, or clean up the wording. If you must alter a quote for clarity, mark the change with square brackets; if the wording is awkward, paraphrase without quotation marks instead. Name the speaker and the medium when you introduce a quote. Keep short quotes run-in inside the sentence. Set off a long quotation (more than about fifteen words) as its own indented block, introduced by a one-sentence attribution clause, so the source's voice is visually distinct from yours."
      baseline_text_sha256: 415dbe17866d42424594e0248436d5801749966e5a2da0a56b62687c975c6539
