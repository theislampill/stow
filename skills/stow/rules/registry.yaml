    title: Concrete, descriptive headings
    wording:
      baseline_kind: verbatim
      baseline_text: "**No narrative, dramatic, or AI-generic headings.** Headings must be concrete and descriptive. Do not use narrative framing (\"The Right to Repair Trap\"), thriller-style mystery (\"The Hidden Cost of Serialization\"), clickbait structure (\"Why Apple Destroys Your Right to Repair\"), or vague analytical headings (\"Broader pattern\", \"Broader implications\", \"Wider context\", \"Larger trend\", \"Industry-wide impact\"). A heading describes what the section contains, not what it means. Name the subject, not the abstraction."
