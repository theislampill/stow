  - id: CFL-003
    origin: registry
    participants:
      - {kind: rule, ref: STOW-PRC-001}
      - {kind: rule, ref: STOW-PRO-007}
    activation_predicate: A controlled-technical profile is active over procedural prose and sentence-length variation is preferred.
    winner: {band: profile, ref: STOW-PRC-001}
    losing_behavior: Letting a procedural sentence exceed the word cap to vary rhythm.
    permitted_substitute: Vary sentence length below the cap, never above it
    registry_resolution: Sentence-length caps govern inside a controlled-technical profile. Vary sentence length below the cap, never above it; the profile outranks the presentation-layer variance preference.
    resolution_kind: deterministic
    fixtures:
      positive: "Short step. Then a longer step that still stays under the cap. Then short again."
      adversarial: "For variety, one long flowing step of many clauses that runs past the cap."
    evidence: registry.yaml conflicts[] edges on STOW-PRC-001 and STOW-PRO-007.

  - id: CFL-004
    origin: registry
    participants:
      - {kind: rule, ref: STOW-DSC-003}
      - {kind: rule, ref: STOW-PRO-007}
    activation_predicate: A controlled-technical profile is active over descriptive prose and sentence-length variation is preferred.
    winner: {band: profile, ref: STOW-DSC-003}
    losing_behavior: Letting a descriptive sentence exceed the word cap to vary rhythm.
    permitted_substitute: Vary sentence length below the cap, never above it
    registry_resolution: Sentence-length caps govern inside a controlled-technical profile. Vary sentence length below the cap, never above it; the profile outranks the presentation-layer variance preference.
    resolution_kind: deterministic
    fixtures:
