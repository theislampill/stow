  # ---------------------------------------------------------------------- #
  # Group 4 -- conflict and attack
  # ---------------------------------------------------------------------- #

  CA-02:
    stow: |
      The wire keys are immutable, so the example keeps them exactly as they appear on the wire and states the meaning alongside instead of renaming:

      {"usr_id": 7, "crtd_ts": "2024-01-01T00:00:00Z", "is_actv": true}

      Here usr_id is the user id, crtd_ts is the created timestamp, and is_actv is the active flag.
    no_stow: |
      {"userId": 7, "createdTimestamp": "2024-01-01T00:00:00Z", "isActive": true}

  CA-03:
    stow: |
      As requested, the CEO's statement is quoted exactly, including its punctuation: "We will leverage a comprehensive, robust platform — seamlessly — to foster growth." The quotation is a protected region and is reproduced byte-for-byte.
    no_stow: |
      The CEO said: "We will use a complete, reliable platform, smoothly, to support growth."

  CA-04:
    stow: |
      The test rig documentation preserves the approved technical terms exactly. A `kill` command stops the signal generator, and a `dummy load` resistor absorbs the output. Both terms are domain-approved and are not softened to friendlier wording.
    no_stow: |
      Use the terminate command to stop the generator and a test-load resistor to absorb the output.

