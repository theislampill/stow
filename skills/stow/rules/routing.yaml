# STOW reference load graph (validated, not generated).
#
# This file mirrors the kernel activation map (SKILL.md section 5), the profile
# definitions (rules/profiles.json), and the always-on request-mode router
# (emitted by tools/gen_always_on.py). It is a VALIDATION artifact: the kernel
# is never generated from this file, and no runtime path reads it. Its only job
# is to let tests/test_routing.py assert three-way agreement between the kernel
# activation map, the profile data, and the raw-artifact router row.
#
# One route per section-5 bullet, plus the kernel-alone fallback and the
# raw-artifact exclusion. Each route records:
#   mode        a short STOW-native handle for the route
#   predicate   the verbatim predicate text of the matching kernel line
#   references  the references/ (and rules/) paths the route loads, in order
#   profile     the profile id bound by the route, or null
#   corpus      the corpus module path pattern the route may reach, or null
#   validator   the runtime command that governs the route, or null
#
# STOW-native throughout: no external project names, no borrowed identifiers.
schema_version: 1

routes:
  - mode: always-on-prose
    predicate: "ANY user-facing prose turn"
    references:
      - references/always-on.md
    profile: stow-default
    corpus: null
    validator: python runtime/lint_prose.py

  - mode: format-json
    predicate: "raw JSON"
    references:
      - references/format-json.md
    profile: null
    corpus: null
    validator: python runtime/validate.py

  - mode: format-jsonl
    predicate: "JSONL"
    references:
      - references/format-jsonl.md
    profile: null
    corpus: null
    validator: python runtime/validate.py

  - mode: format-yaml
    predicate: "YAML"
    references:
      - references/format-yaml.md
    profile: null
    corpus: null
    validator: python runtime/validate.py

  - mode: format-markdown
    predicate: "Markdown with embedded literals"
    references:
      - references/format-markdown.md
    profile: null
    corpus: null
    validator: python runtime/validate.py

  - mode: executable-procedure
    predicate: "executable procedure"
    references:
      - references/procedures.md
    profile: controlled-technical-guided
    corpus: null
    validator: python runtime/lint_prose.py

  - mode: system-description
    predicate: "system description"
    references:
      - references/descriptions.md
    profile: null
    corpus: null
    validator: null

  - mode: safety
    predicate: "hazard or damage risk"
    references:
      - references/safety-instructions.md
    profile: null
    corpus: null
    validator: null

  - mode: technical-clarity
    predicate: "technical explanation, architecture description, plan, audit, runbook, or state record"
    references:
      - references/technical-clarity.md
    profile: technical-clarity
    corpus: null
    validator: python runtime/lint_prose.py

  - mode: controlled-technical
    predicate: "controlled-technical-guided profile active or requested (alias: controlled-technical)"
    references:
      - references/controlled-technical-writing.md
    profile: controlled-technical-guided
    corpus: null
    validator: python runtime/lint_prose.py

  - mode: protected-regions
    predicate: "mixed prose and literals"
    references:
      - references/protected-regions.md
    profile: null
    corpus: null
    validator: null

  - mode: conformance
    predicate: "conformance claim"
    references:
      - references/conformance.md
    profile: null
    corpus: null
    validator: null

  - mode: action-shaping-deep
    predicate: "action-shaping deep guidance"
    references:
      - references/action-shaping.md
    profile: null
    corpus: null
    validator: null

  - mode: prose-integrity-deep
    predicate: "prose-integrity deep guidance"
    references:
      - references/prose-integrity.md
    profile: null
    corpus: null
    validator: null

  - mode: evidence-authority-deep
    predicate: "evidence, authority, or artifact-state deep guidance"
    references:
      - references/evidence-and-authority.md
    profile: null
    corpus: null
    validator: null

  - mode: precedence-and-region
    predicate: "precedence or region question"
    references:
      - references/activation-and-precedence.md
    profile: null
    corpus: null
    validator: null

  - mode: user-facing-shaping
    predicate: "user-facing shaping question"
    references:
      - references/user-facing-output.md
    profile: null
    corpus: null
    validator: null

  - mode: meta-code
    predicate: "meta-code artifact (handoff, plan, audit, runbook, state, task packet, event stream, cross-harness envelope)"
    references:
      - references/meta-code.md
    profile: technical-clarity
    corpus: null
    validator: python runtime/validate.py

  - mode: rule-audit
    predicate: "rule audit, conformance, or deep application"
    references:
      - references/rule-index.md
      - rules/registry.yaml
    profile: null
    corpus: corpus/**/*.md
    validator: null

  - mode: kernel-alone
    predicate: "When no predicate is true, answer from this kernel alone."
    references: []
    profile: null
    corpus: null
    validator: null

  - mode: raw-artifact-exclusion
    predicate: "a raw JSON, JSONL, YAML, or code artifact loads none of them."
    references: []
    profile: null
    corpus: null
    validator: python runtime/validate.py

# References that no section-5 predicate targets directly. Each carries a reason.
# rule-index.md and always-on.md ARE routed (they appear in a route above), so
# they never appear here. Every other reference file that is not a route target
# must be listed here with a reason, or test_routing.py fails.
unrouted:
  - reference: references/agent-handoffs.md
    reason: "meta-code spoke reached through the references/meta-code.md hub, not a section-5 predicate."
  - reference: references/audit-and-evidence.md
    reason: "meta-code spoke reached through the references/meta-code.md hub, not a section-5 predicate."
  - reference: references/continuity-and-state.md
    reason: "meta-code spoke reached through the references/meta-code.md hub, not a section-5 predicate."
  - reference: references/cross-harness-interchange.md
    reason: "meta-code spoke reached through the references/meta-code.md hub, not a section-5 predicate."
  - reference: references/implementation-plans.md
    reason: "meta-code spoke reached through the references/meta-code.md hub, not a section-5 predicate."
  - reference: references/runbooks.md
    reason: "meta-code spoke reached through the references/meta-code.md hub and the technical-clarity reference, not a section-5 predicate."
  - reference: references/ai-writing-detection.md
    reason: "detection-reference spoke reached from the prose-integrity corpus detection-patterns module, not a section-5 predicate."
