# behavioural.yaml -- STOW GREEN behavioural fixtures (P5)
#
# For each of the 27 deterministic cases in baseline.yaml (17 hard-gating + 10
# semi-deterministic; the 6 judge cases are skipped), this file carries a paired
# set of answer fixtures keyed by case id:
#
#   stow      a STOW-COMPLIANT answer. Its detector (from tests/eval_runner.py)
#             returns True -> the case's red_assertion is now SATISFIED (GREEN).
#   no_stow   the P1 RED baseline answer, reproduced verbatim so the RED->GREEN
#             delta is self-contained. Its detector returns False (the failure
#             is present).
#
# SCOPE (honest): these are fixture / detector-contract tests. There is NO
# model-invocation harness in this project. A detector runs against a supplied
# answer string and asserts a property; it does not prove live model behaviour.
# The `stow` fixtures are hand-authored to model what a STOW-governed answer
# looks like; passing here is a contract result, not a live-model result.
#
# This file is source-name-free and passes the anti-leak gate.

fixtures:

  # ---------------------------------------------------------------------- #
  # Group 1 -- user-facing
  # ---------------------------------------------------------------------- #

  UF-01:
    stow: |
      Canberra is the capital of Australia.
    no_stow: |
      Great question! The capital of Australia is Canberra, not Sydney as many people assume. Let me know if you'd like anything else!

  UF-02:
    stow: |
      1. Guard against the undefined hash before calling bcrypt.compare.
      2. Return 401 when the user lookup finds no record.
      3. Add a regression test that posts an unknown email and asserts a 401 response.
    no_stow: |
      You'll want to first make sure the user lookup returns a record, and then guard against the undefined hash before calling compare, and then return a 401 if the record is missing.

  UF-04:
    stow: |
      Renamed every occurrence of `usr` to `user` in auth.js.
    no_stow: |
      Done -- renamed all occurrences. Next, you might want to run your linter and also review the surrounding code for other short names. Let me know if you need anything else!

  UF-05:
    stow: |
      The request returned 401 because the auth token was missing or rejected before the handler ran. Add the Authorization header (or a valid session) to the test setup so the request authenticates, and the 200 assertion passes.
    no_stow: |
      Uh oh! It looks like something's gone wrong with your test. There seems to be an issue with the response coming back.

