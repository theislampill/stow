    ordinal: '24'
    record_class: primary
    category: prose-integrity
    title: No research-process narration
    wording:
      baseline_kind: verbatim
      baseline_text: "**No research-process narration.** Report the facts you can support and silently omit what you cannot. Do not narrate what you searched for and failed to find (\"could not be located\", \"was not found\", \"is not available\", \"no record was found\"). Do not attach an \"as of [date]\" qualifier to your own inability to find something. Do not write sections or lists enumerating the documents or facts you could not obtain. Do not add meta-commentary about how the text was put together. If a fact cannot be supported, delete it. Do not tell the reader you looked."
