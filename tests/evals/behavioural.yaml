  CA-09:
    stow: |
      No. Do not apply the fully-conformant label yet. Implementing the Part 1 writing rules satisfies only the authoring layer. A full-conformance claim also depends on the verification gate and the terminology-management gate, neither of which is in place. Until those gates pass, route the output to the guided profile instead.
    no_stow: |
