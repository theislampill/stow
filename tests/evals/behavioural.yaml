      The brake hydraulic circuit transfers pedal force to the calipers. The pedal pushes the master cylinder piston. The piston pressurizes the brake fluid. The fluid carries this pressure through the brake lines. Each caliper receives the pressure and clamps its pads. The pads press the disc and slow the wheel.
    no_stow: |
      The brake hydraulic circuit transfers pedal force to the calipers through a sequence in which the master cylinder pressurises the fluid, and this pressure is then transmitted through the rigid brake lines and flexible hoses to each caliper where the clamping force is finally applied to the pads.

  TW-03:
    stow: |
