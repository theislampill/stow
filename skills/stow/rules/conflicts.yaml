# states the operational test a reviewer or model applies).
schema_version: 1
conflicts:
  - id: CFL-001
    origin: registry
    participants:
      - {kind: rule, ref: STOW-WRD-011}
      - {kind: rule, ref: STOW-PRO-007}
    activation_predicate: A controlled-technical profile is active and recurring content tempts wording variation.
    winner: {band: profile, ref: STOW-WRD-011}
    losing_behavior: Varying the term used for one item or recurring step to satisfy the variation preference.
    permitted_substitute: Keep consistent terminology and wording for the same item or recurring step
    registry_resolution: Keep consistent terminology and wording for the same item or recurring step. Domain terminology and the controlled-technical profile outrank the presentation-layer variation preference.
    resolution_kind: semantic-review
    fixtures:
      positive: "Step 2 names the drain valve. Step 5 must say drain valve again, not outlet tap."
      adversarial: "The prose reads repetitively, so alternate between drain valve and outlet tap for flow."
    evidence: registry.yaml conflicts[] edges on STOW-WRD-011 and STOW-PRO-007.

  - id: CFL-002
    origin: registry
    participants:
      - {kind: rule, ref: STOW-STY-004}
      - {kind: rule, ref: STOW-PRO-007}
    activation_predicate: Recurring content repeats across a document while the variation preference is active.
    winner: {band: profile, ref: STOW-STY-004}
    losing_behavior: Rewording a recurring caution, step, or label between occurrences.
    permitted_substitute: Keep consistent terminology and wording for the same item or recurring step
    registry_resolution: Keep consistent terminology and wording for the same item or recurring step. Domain terminology and the controlled-technical profile outrank the presentation-layer variation preference.
    resolution_kind: semantic-review
    fixtures:
      positive: "The same caution text appears before step 3 and step 9, word for word."
      adversarial: "Rephrase the second caution so the document does not repeat itself."
