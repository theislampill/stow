  CA-11:
    stow: |
      1. Unvalidated input reaches the query builder without checks.
      2. SQL injection is possible through string concatenation in the query.
      3. Missing null check on the user record before it is dereferenced.
      4. Race condition on the shared counter under concurrent access.
      5. Hardcoded secret (an API key) is committed in the source.
      6. Swallowed exception hides the failure inside an empty catch.
      7. Off-by-one error in the loop bound over the results.
      8. No timeout on the outbound network call.
    no_stow: |
      Here are the top 5 issues: 1) unvalidated input, 2) SQL injection, 3) a missing null check, 4) a race condition, and 5) a hardcoded secret. Plus a few others.

